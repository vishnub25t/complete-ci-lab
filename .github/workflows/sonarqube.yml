name: sonargube 

on:
  workflow_dispatch:
  #pull_request:
    #branches: ["main"]

jobs:
  sonarqube:
    runs-on: [self-hosted ,wsl-1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Sonarqube scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        with:
          args: >
            -Dsonar.projectKey=app.js
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        
